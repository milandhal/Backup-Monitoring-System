<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Database Backup Monitoring System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link href="../css/style.css" rel="stylesheet">
    <style>
        .password-toggle {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--steel-grey);
            z-index: 10;
        }
    </style>
</head>
<body class="login-body">
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="login-card p-4 p-md-5 text-center page-transition">
            <!-- Emblem/Logo -->
            <div class="mb-4 d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #003366 0%, #8B0000 100%); box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                <i class="fas fa-train fa-2x text-white"></i>
            </div>
            
            <div class="mb-2">
                <span class="badge bg-dark text-warning px-3 py-1 mb-2 font-monospace" style="letter-spacing: 1px; font-size: 0.7rem;">
                    <i class="fas fa-shield-alt me-1"></i> SECURED GOVERNMENT NETWORK
                </span>
            </div>
            
            <h3 class="login-title mb-1">Database Backup Monitoring System</h3>
            <p class="text-muted mb-4 fw-medium" style="font-size: 0.85rem;">Indian Railways Infrastructure Control Room</p>
            
            <!-- Login Form -->
            <form id="loginForm" class="text-start">
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold text-secondary" style="font-size: 0.8rem;">
                        <i class="fas fa-user-shield me-2"></i>Username / Employee ID
                    </label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-secondary"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" id="username" placeholder="Enter employee username" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label fw-bold text-secondary" style="font-size: 0.8rem;">
                        <i class="fas fa-key me-2"></i>Security Passcode
                    </label>
                    <div class="input-group position-relative">
                        <span class="input-group-text bg-white border-end-0 text-secondary"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control border-start-0 ps-0 pe-5" id="password" placeholder="Enter security passcode" required>
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                </div>
                
                <div class="d-flex align-items-center justify-content-between mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe" checked>
                        <label class="form-check-label text-secondary" for="rememberMe" style="font-size: 0.85rem; cursor: pointer;">Remember Session</label>
                    </div>
                    <a href="#" class="text-decoration-none fw-semibold" style="color: var(--primary-maroon); font-size: 0.85rem;" id="btnForgot">
                        Forgot Passcode?
                    </a>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold text-uppercase" style="background: linear-gradient(135deg, var(--primary-blue) 0%, #002244 100%); border: none; letter-spacing: 0.5px;">
                    <i class="fas fa-sign-in-alt me-2"></i>Authenticate Session
                </button>
            </form>
            

        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Core Application Logic -->
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("loginForm");
            const togglePassword = document.getElementById("togglePassword");
            const passwordInput = document.getElementById("password");
            const btnForgot = document.getElementById("btnForgot");

            // Toggle passcode visibility
            togglePassword.addEventListener("click", () => {
                const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
                passwordInput.setAttribute("type", type);
                togglePassword.classList.toggle("fa-eye");
                togglePassword.classList.toggle("fa-eye-slash");
            });

            // Simulate Forgot Password behavior
            btnForgot.addEventListener("click", (e) => {
                e.preventDefault();
                showToast("Passcode Recovery Triggered", "A password reset request has been forwarded to the CRIS System Administrator for review.", "warning");
            });

            // Simulate form login submission
            form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    try {

        const response = await fetch(
            "http://127.0.0.1:5000/api/login",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username,
                    password
                })
            }
        );

        const result = await response.json();

        if (response.ok) {

            localStorage.setItem(
                "loggedUser",
                JSON.stringify(result.user)
            );

            showToast(
                "Authentication Success",
                "Login Successful",
                "success"
            );

            setTimeout(() => {
                window.location.href =
                    "dashboard.html";
            }, 1000);

        } else {

            alert(result.message);
        }

    } catch (error) {

        console.error(error);

        alert("Server Error");
    }
});
    });
    </script>
</body>
</html>
